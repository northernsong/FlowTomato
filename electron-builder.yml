appId: com.flowtomato.app
productName: FlowTomato
copyright: Copyright © 2025 FlowTomato

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.*"
  - "!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig,tsconfig.*}.json"

mac:
  category: public.app-category.productivity
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  icon: build/icon.icns

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
        - ia32

linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: FlowTomato
  runAfterFinish: true

publish:
  provider: github
  owner: northernsong
  repo: FlowTomato
